services:
  dns-dashboard:
    build:
      context: .
      dockerfile: server/Dockerfile
      args:
        # Labels the header "Production" in this environment only -- the UAT
        # stacks (uat/docker-compose.uat.yml) don't set this build arg, so
        # their built images stay unlabeled. Baked in at image build time, so
        # it survives every `docker compose up --build` without any extra step.
        VITE_ENV_LABEL: "Production"
    container_name: dns-dashboard
    restart: unless-stopped
    ports:
      - "${DASHBOARD_PORT:-8090}:8090"
    environment:
      PIHOLE_DB_PATH: /pihole-data/pihole-FTL.db
      # Writable store for DNS Watch's own state (alert rules + fired events).
      # Kept entirely separate from Pi-hole's database.
      DNSWATCH_DB_PATH: /data/dnswatch.db
      # How often (seconds) the server evaluates alert rules on its own, so
      # alerts + webhooks fire even with no dashboard open. Set 0 to disable.
      ALERT_EVAL_INTERVAL_SECONDS: 60
      # Optional dashboard login. Unset = open on LAN; set a password to require
      # HTTP Basic auth for the whole app. Username defaults to "admin".
      DNSWATCH_AUTH_USERNAME: ${DNSWATCH_AUTH_USERNAME:-admin}
      DNSWATCH_AUTH_PASSWORD: ${DNSWATCH_AUTH_PASSWORD:-}
      # Alternative to DNSWATCH_AUTH_PASSWORD above: point this at a mounted
      # file (e.g. a Docker secret) instead of putting the password in plain
      # env — env vars are visible via `docker inspect`/`/proc/<pid>/environ`
      # to anyone with host/container access. Takes precedence when set and
      # readable; falls back to DNSWATCH_AUTH_PASSWORD otherwise. Unset by
      # default — most single-user LAN setups don't need this.
      DNSWATCH_AUTH_PASSWORD_FILE: ${DNSWATCH_AUTH_PASSWORD_FILE:-}
      # Optional: DNS server to query for reverse-DNS (PTR) lookups of LAN
      # clients Pi-hole never named (see app/resolve.py). Unset = use whatever
      # /etc/resolv.conf lists (this container's normal upstream). Many home
      # routers answer PTR queries for their own DHCP leases even when they
      # aren't Pi-hole's configured upstream — point this at your router's LAN
      # IP if PTR lookups against the default resolver come back empty.
      DNSWATCH_REVERSE_DNS_SERVER: ${DNSWATCH_REVERSE_DNS_SERVER:-}
    volumes:
      # Read-only mount of Pi-hole's data folder. ':ro' is critical — this
      # process must never be able to write to Pi-hole's database.
      - ${PIHOLE_ETC_PATH}:/pihole-data:ro
      # Writable named volume for alert rules/events only.
      - dnswatch-data:/data

volumes:
  dnswatch-data:
